# Nixpacks build config for the kirana backend.
#
# whatsapp-web.js drives WhatsApp Web through a Chromium that Puppeteer
# launches. Two approaches were tried before this one:
#
#   1. apt install chromium → fails on Ubuntu Noble (24.04) because the
#      `chromium` apt package is a snap wrapper. Snap doesn't work in
#      Railway's container, so Puppeteer's launch hangs forever and
#      WASetup is stuck on "Starting…".
#   2. Listing every Chrome runtime lib explicitly → the t64 transition
#      in Noble renamed lots of them (libasound2 → libasound2t64, etc.)
#      and trying to keep a portable list across Debian/Ubuntu base
#      images is fragile.
#
# Current approach (works, robust):
#   • Don't install chromium via apt.
#   • Let Puppeteer download its bundled Chrome at npm install time
#     (no PUPPETEER_SKIP_DOWNLOAD env var). This gives us a real
#     non-snap Chromium binary that Puppeteer manages.
#   • Install only the runtime libs Chrome NEEDS at launch via aptPkgs,
#     using the t64 names where Noble requires them. apt resolves the
#     handful of further libs automatically through dependencies.
#   • Don't set PUPPETEER_EXECUTABLE_PATH — Puppeteer finds its own
#     bundled Chrome. backend/src/whatsapp/client.js gates on the env
#     var so this is a no-op there.

[phases.setup]
aptPkgs = [
  # Fonts — chromium recommends but doesn't depend on these. Without them
  # WhatsApp Web's headless rendering shows boxes for emoji / Indic text.
  "fonts-liberation",
  "fonts-noto-color-emoji",
  "fonts-indic",

  # Runtime libs Puppeteer's bundled Chrome dlopens. Using t64 names where
  # Ubuntu Noble has renamed them; the rest stay as-is.
  "ca-certificates",
  "libasound2t64",
  "libatk-bridge2.0-0t64",
  "libatk1.0-0t64",
  "libcairo2",
  "libcups2t64",
  "libdbus-1-3",
  "libexpat1",
  "libfontconfig1",
  "libgbm1",
  "libglib2.0-0t64",
  "libgtk-3-0t64",
  "libnspr4",
  "libnss3",
  "libpango-1.0-0t64",
  "libx11-6",
  "libxcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxkbcommon0",
  "libxrandr2",
  "xdg-utils",
]

# (intentionally no PUPPETEER_SKIP_DOWNLOAD / PUPPETEER_EXECUTABLE_PATH —
#  see the long comment at the top of this file.)
