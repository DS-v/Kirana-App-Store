# Nixpacks build config for the kirana backend.
#
# whatsapp-web.js drives WhatsApp Web through a Chromium that Puppeteer
# launches. Approaches we ruled out:
#
#   1. apt install chromium → on Ubuntu Noble (24.04) this is a snap
#      wrapper. Snap doesn't run in Railway's container; Puppeteer's
#      launch hangs / fails silently.
#   2. Listing every Chrome runtime lib explicitly with t64 suffixes →
#      fragile. Some libs got the t64 rename on Noble (libasound2,
#      libcups2, libglib2.0-0, libgtk-3-0, libatk-bridge2.0-0,
#      libatk1.0-0), some didn't (libpango-1.0-0, libcairo2, libnss3).
#      Maintaining the right list per base image is a moving target.
#
# Current approach: install Google Chrome from Google's official apt
# repo. The .deb declares all of its runtime deps (the right t64 names
# included), apt resolves them automatically, and we get a real binary
# that works in containers. PUPPETEER_SKIP_DOWNLOAD=true makes npm
# install skip Puppeteer's bundled-Chrome download (~150 MB saved).

[phases.setup]
aptPkgs = [
  "wget",
  "gnupg",
  "ca-certificates",
  "fonts-liberation",
  "fonts-noto-color-emoji",
  "fonts-indic",
]
cmds = [
  # Add Google's apt signing key to a keyring file (apt-key is deprecated)
  "wget -qO- https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg",
  # Add Google's apt repo restricted to amd64 + signed by the keyring above
  "echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] https://dl.google.com/linux/chrome/deb/ stable main' | sudo tee /etc/apt/sources.list.d/google-chrome.list",
  "sudo apt-get update -qq",
  # google-chrome-stable's deb declares its own runtime deps — apt fetches
  # libnss3, libcups2t64, libgtk-3-0t64, the right libpango / libatk
  # variants, etc. No manual lib enumeration needed.
  "sudo apt-get install -y --no-install-recommends google-chrome-stable",
]

[variables]
# Skip Puppeteer's bundled-Chrome download — we have google-chrome-stable
# at /usr/bin/google-chrome-stable, which client.js picks up via the env var.
PUPPETEER_SKIP_DOWNLOAD     = "true"
PUPPETEER_EXECUTABLE_PATH   = "/usr/bin/google-chrome-stable"
