# Nixpacks build config for the kirana backend.
#
# Why this file exists: whatsapp-web.js needs a headless Chromium that
# Puppeteer can launch. Nixpacks's default Node template doesn't ship
# Chromium, so the dynamic import of ./routes/whatsapp.js was failing at
# boot — falling back to the 503 stub.
#
# `aptPkgs` runs `apt-get install` during the build's setup phase, putting
# chromium at /usr/bin/chromium. The two PUPPETEER_* env vars then tell
# Puppeteer to skip its own ~150 MB Chrome download (we already have one)
# and use the system binary.
#
# Volumes for whatsapp-web.js LocalAuth persistence (./.wa-session) are
# configured in Railway's dashboard:
#   Service → Settings → Volumes → Add Volume → mount path /app/.wa-session

[phases.setup]
# Just `chromium` — apt resolves all its runtime libs automatically. The
# previous enumerated list (libasound2, libatk-bridge2.0-0, ...) tripped
# the Ubuntu 24.04 (Noble) `t64` rename, e.g. libasound2 → libasound2t64.
# Listing only the top-level package keeps this portable across Debian /
# Ubuntu base-image upgrades.
#
# Fonts are added explicitly because chromium "Recommends" but doesn't
# strictly depend on them — without these, text in scanned WhatsApp
# screenshots / emoji can render as boxes when whatsapp-web.js takes
# headless screenshots internally.
aptPkgs = [
  "chromium",
  "ca-certificates",
  "fonts-liberation",
  "fonts-noto-color-emoji",
  "fonts-indic",
]

# Skip Puppeteer's bundled-Chrome download — we already have chromium via apt.
# These are exported during install AND at runtime.
[variables]
PUPPETEER_SKIP_DOWNLOAD     = "true"
PUPPETEER_EXECUTABLE_PATH   = "/usr/bin/chromium"
